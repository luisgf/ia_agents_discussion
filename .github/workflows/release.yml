name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag v0.2.0 && git push --tags
# The tag must match __version__ in src/agents_discussion/__init__.py.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import pathlib, re; m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('src/agents_discussion/__init__.py').read_text()); print(m.group(1) if m else '')")"
          if [ -z "$pkg" ]; then
            echo "::error::Could not parse __version__ from src/agents_discussion/__init__.py (it must be a double-quoted literal)."
            exit 1
          fi
          echo "tag=$tag  package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match __version__ ($pkg). Bump src/agents_discussion/__init__.py first."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
