name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # ruff pinned so `format --check` is reproducible across runs
          pip install "ruff==0.15.18" "pytest>=8"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Syntax check
        run: python -m py_compile src/agents_discussion/*.py tests/*.py

      - name: Tests
        run: pytest -q
